<text x="58" y="783.0" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033" text-anchor="start">Pfeil-Legende</text>
<text x="58" y="813.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Blau = Hot Path / Benutzeraktion · Grün = fachlicher Write/Callback über FastAPI · Magenta gestrichelt = n8n-Orchestrierung · Dunkelgrau =</text>
<text x="58" y="828.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Datenbankpersistenz · Orange gestrichelt = Fallback/Kontext</text>
<rect x="40" y="870" width="500" height="138" rx="18" fill="#fff" stroke="#111827" stroke-width="2"/>
<text x="58" y="904.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">1 · Picking-Bestätigung</text>
<text x="58" y="933.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">PWA → FastAPI `/confirm-line` → Claim/Idempotency-Prüfung</text>
<text x="58" y="948.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">→ Odoo-Write. Danach feuert FastAPI `pick-confirmed`</text>
<text x="58" y="964.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">asynchron an n8n; fachlich bleibt das Picking auch bei</text>
<text x="58" y="979.8" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">n8n-Degradation gültig.</text>
<rect x="600" y="870" width="500" height="138" rx="18" fill="#fff" stroke="#111827" stroke-width="2"/>
<text x="618" y="904.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">2 · Voice &amp; Ausnahmeassistenz</text>
<text x="618" y="933.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Normaler Voice-Pfad: PWA → FastAPI → Whisper → lokale</text>
<text x="618" y="948.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Intent-Logik → PWA. Ausnahmeassistenz: FastAPI reichert</text>
<text x="618" y="964.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Odoo/Obsidian-Kontext an und fragt n8n synchron mit</text>
<text x="618" y="979.8" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">lokalem Fallback.</text>
<rect x="1160" y="870" width="500" height="138" rx="18" fill="#fff" stroke="#111827" stroke-width="2"/>
<text x="1178" y="904.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">3 · Quality Alert / Welle A</text>
<text x="1178" y="933.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">FastAPI erstellt den Alert zuerst in Odoo. Bei n8n-Erfolg</text>
<text x="1178" y="948.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">wird `pending` gesetzt. Bei Dispatch-Fehler greift lokaler</text>
<text x="1178" y="964.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Backend-Fallback. n8n-Writebacks laufen nur über interne</text>
<text x="1178" y="979.8" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">FastAPI-Callbacks.</text>
<rect x="40" y="1045" width="1620" height="100" rx="18" fill="#fff" stroke="#111827" stroke-width="2"/>
<text x="58" y="1079.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">Architekturregeln</text>
<text x="58" y="1108.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Odoo bleibt System of Record · FastAPI ist die einzige App-API für die PWA · n8n liegt nicht im normalen Voice-Hot-Path · n8n schreibt fachlich nie</text>
<text x="58" y="1123.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">direkt nach Odoo. Touch bleibt Fallback; Voice ist Enhancement.</text>
